<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobrador de Exames</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="text-center mb-4">
            <h1 class="text-primary fw-bold"><i class="bi bi-file-medical text-primary"></i> COBRADOR DE EXAMES DO HC-UFMG</h1>
            <p class="text-muted fw-bold">Otimizado para Pediatria</p>
            <p>Cole o texto contido no PDF para extrair os dados de forma organizada.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">
                        <form action="/processar" method="POST">
                            <div class="mb-3">
                                <label for="texto" class="form-label fw-bold">Cole o conteúdo dos exames:</label>
                                <textarea class="form-control bg-light border-0" id="texto" name="texto" rows="10" placeholder="DICA: CTRL+A em todo o PDF para selecioná-lo. CTRL+C para copiar. Então cole aqui." required></textarea>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-bold"><i class="bi bi-gear-fill"></i> Processar e Ver Resultados</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="text-center mt-5 mb-4 text-muted small">
        &copy; 2026 COBRADOR DE EXAMES DO HC-UFMG<br>
        <span style="font-size: 0.8em;">Não utilizar IA. Funciona 100% offline via Regex.</span>
    </footer>
</body>
</html>
